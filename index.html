<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>백도진(@baek.dojin)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/variable/pretendardvariable.css" />
    <style>
        :root { --ig-bg: #fff; --ig-text: #000; --ig-gray: #dbdbdb; --ig-light-gray: #efefef; --ig-blue: #0095f6; --ig-link: #00376b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard Variable', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #fafafa; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; color: var(--ig-text); }
        .app-container { background-color: var(--ig-bg); width: 100%; max-width: 430px; min-height: 100vh; border-left: 1px solid var(--ig-gray); border-right: 1px solid var(--ig-gray); position: relative; padding-bottom: 50px; }

        /* DM 알림 */
        .dm-notification { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; background: rgba(255,255,255,0.98); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 9999; animation: slideDown 6s ease-in-out forwards; border: 1px solid #efefef; }
        @keyframes slideDown { 0% { top: -100px; } 10% { top: 20px; } 90% { top: 20px; opacity: 1; } 100% { top: -100px; opacity: 0; } }
        .dm-icon { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .dm-user { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
        .dm-text { font-size: 14px; color: #333; }

        .header { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: sticky; top: 0; background: var(--ig-bg); z-index: 10; border-bottom: 0.5px solid var(--ig-gray); }
        .header-left { display: flex; align-items: center; gap: 4px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .header-left svg { width: 12px; height: 12px; }
        .header-right { display: flex; gap: 20px; }
        .icon-btn { cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 24px; height: 24px; }

        .profile { padding: 12px 16px; }
        .profile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .avatar-wrapper { position: relative; width: 84px; height: 84px; border-radius: 50%; background: linear-gradient(45deg, #a8c0ff 0%, #7b8ee8 50%, #5c6bc0 100%); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar-inner { width: 78px; height: 78px; border-radius: 50%; border: 3px solid var(--ig-bg); overflow: hidden; background: #e8e8e8; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }
        .stats { display: flex; gap: 24px; text-align: center; flex: 1; justify-content: center; margin-left: 20px; }
        .stat-box { display: flex; flex-direction: column; cursor: pointer; }
        .stat-box b { font-size: 16px; font-weight: 700; }
        .stat-box span { font-size: 13px; }

        .bio { font-size: 14px; line-height: 1.4; display: flex; flex-direction: column; gap: 2px; margin-bottom: 15px; }
        .bio-name { font-weight: 700; }
        .bio-location { color: var(--ig-link); font-size: 13px; font-weight: 500; }
        .bio-desc { white-space: pre-wrap; }
        .bio-link-wrap { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
        .bio-link-wrap svg { width: 12px; height: 12px; fill: var(--ig-link); }
        .bio-link { color: var(--ig-link); text-decoration: none; font-weight: 600; font-size: 14px; }

        /* BGM 위젯 */
        .bgm-widget { margin: 0 16px 12px; background: #fafafa; border: 1px solid var(--ig-gray); border-radius: 6px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
        .music-bars { display: flex; gap: 2px; height: 12px; align-items: flex-end; }
        .bar { width: 3px; background: var(--ig-text); animation: bounce 1s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; } .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 3px; } 100% { height: 12px; } }
        .bgm-paused .bar { animation: none; height: 3px; }
        .bgm-play-btn { background: #5c6bc0; border: none; color: #fff; font-family: 'Pretendard Variable', sans-serif; font-size: 12px; font-weight: 600; padding: 5px 12px; cursor: pointer; border-radius: 4px; white-space: nowrap; }

        /* BGM 팝업 */
        .bgm-popup { display: none; position: fixed; bottom: 20px; right: 16px; z-index: 9999; background: #1a1a2e; border: 2px solid #5c6bc0; border-radius: 8px; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); }
        .bgm-popup-header { background: #5c6bc0; padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; cursor: grab; user-select: none; }
        .bgm-popup-header span { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
        .bgm-popup-header div { display: flex; gap: 6px; }
        .bgm-popup-header button { background: none; border: none; color: #fff; font-size: 14px; cursor: pointer; padding: 0 4px; line-height: 1; }
        .bgm-popup-body { padding: 10px; }
        .bgm-popup-body iframe { width: 100%; border-radius: 4px; }

        .action-buttons { padding: 0 16px 16px; display: flex; gap: 6px; }
        .btn { flex: 1; background: var(--ig-light-gray); border-radius: 8px; padding: 7px 16px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; border: none; color: var(--ig-text); transition: 0.2s; }
        .btn-blue { background: var(--ig-blue); color: white; }

        .highlights { display: flex; gap: 15px; padding: 0 16px 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--ig-light-gray); }
        .highlights::-webkit-scrollbar { display: none; }
        .highlight-item { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; cursor: pointer; width: 62px; }
        .h-circle { width: 62px; height: 62px; border-radius: 50%; border: 1px solid var(--ig-gray); display: flex; align-items: center; justify-content: center; font-size: 24px; padding: 3px; background: transparent; }
        .h-inner { width: 100%; height: 100%; border-radius: 50%; background: #fafafa; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--ig-bg); }
        .highlight-text { font-size: 11px; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; text-align: center; color: #262626; }

        .feed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding-bottom: 20px; margin-top: 15px; }
        .grid-item { position: relative; width: 100%; aspect-ratio: 1 / 1; background: var(--ig-light-gray); cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .grid-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: 48px; background: var(--ig-bg); border-top: 0.5px solid var(--ig-gray); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { cursor: pointer; padding: 10px; }
        .nav-item svg { width: 24px; height: 24px; fill: var(--ig-text); }
        .nav-profile { width: 24px; height: 24px; border-radius: 50%; overflow: hidden; border: 1px solid var(--ig-gray); background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ig-bg); z-index: 200; justify-content: center; }
        .modal-content { width: 100%; max-width: 430px; height: 100%; overflow-y: auto; background: var(--ig-bg); display: flex; flex-direction: column; position: relative; padding-bottom: 60px; }
        .post-header { display: flex; align-items: center; padding: 10px 14px; border-bottom: 0.5px solid var(--ig-light-gray); position: sticky; top: 0; background: var(--ig-bg); z-index: 10; }
        .back-btn { margin-right: 16px; cursor: pointer; display: flex; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; margin-right: 10px; border: 1px solid var(--ig-light-gray); background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .post-user-info { display: flex; flex-direction: column; justify-content: center; }
        .post-username { font-weight: 600; font-size: 14px; }
        .post-location { font-size: 12px; color: var(--ig-link); }

        .post-img-container { width: 100%; aspect-ratio: 1/1; position: relative; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; font-size: 64px; }
        .post-img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out; }
        .zoom-overlay img { max-width: 100vw; max-height: 100vh; object-fit: contain; }

        .pop-heart { position: absolute; width: 100px; height: 100px; fill: white; opacity: 0; transform: scale(0); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); pointer-events: none; z-index: 5; }
        @keyframes heartPop { 0% { transform: scale(0); opacity: 0; } 15% { transform: scale(1.2); opacity: 1; } 30% { transform: scale(1); opacity: 1; } 70% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.8); opacity: 0; } }
        .animate-heart { animation: heartPop 1s ease-out forwards; }

        .post-actions { padding: 12px 14px; display: flex; align-items: center; gap: 16px; }
        .post-actions svg { width: 24px; height: 24px; cursor: pointer; fill: transparent; stroke: var(--ig-text); stroke-width: 2; transition: 0.2s; }
        .action-right { margin-left: auto; }
        .liked-heart { fill: #ed4956 !important; stroke: #ed4956 !important; }
        .saved-mark { fill: var(--ig-text) !important; }

        .post-likes { padding: 0 14px; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
        .post-caption { padding: 0 14px; font-size: 14px; line-height: 1.5; margin-bottom: 6px; }
        .post-caption b { font-weight: 600; margin-right: 4px; }
        .post-time { padding: 0 14px 12px; font-size: 11px; color: #8e8e8e; border-bottom: 0.5px solid var(--ig-light-gray); }

        .comments-wrap { padding: 12px 14px; display: flex; flex-direction: column; gap: 16px; }
        .comment-row { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .c-avatar { width: 32px; height: 32px; border-radius: 50%; background: #eee; flex-shrink: 0; overflow: hidden; }
        .c-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .c-content { font-size: 14px; line-height: 1.4; flex: 1; }
        .c-content b { font-weight: 600; margin-right: 4px; }

        .comment-input-area { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: 60px; background: var(--ig-bg); border-top: 0.5px solid var(--ig-gray); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 20; }
        .my-c-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .comment-input-box { flex: 1; display: flex; align-items: center; }
        .comment-input-box input { width: 100%; border: none; outline: none; font-size: 14px; background: transparent; }
        .comment-submit { color: var(--ig-blue); font-weight: 600; font-size: 14px; cursor: pointer; border: none; background: transparent; padding: 5px; opacity: 0.5; }
        .comment-submit.active { opacity: 1; }

        /* 스토리 모달 */
        .story-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 300; justify-content: center; }
        .story-content { width: 100%; max-width: 430px; height: 100%; position: relative; background: #1a1a1a; display: flex; flex-direction: column; }
        .story-progress { position: absolute; top: 10px; left: 10px; right: 10px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; z-index: 10; display: flex; gap: 4px; }
        .s-bar { flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; height: 100%; }
        .s-bar.active { background: #fff; }
        .story-header { position: absolute; top: 20px; left: 10px; right: 10px; display: flex; align-items: center; justify-content: space-between; z-index: 10; color: white; }
        .sh-user { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
        .sh-user .sh-avatar { width: 32px; height: 32px; border-radius: 50%; background: #5c6bc0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .sh-close { cursor: pointer; font-size: 24px; padding: 0 5px; }

        .story-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #1e1e2e; position: relative; }
        .yajak-box { background: #252535; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); width: 85%; text-align: center; border: 1px solid rgba(92,107,192,0.3); }
        .yajak-top { font-weight: 800; font-size: 13px; color: #a0aee8; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(92,107,192,0.3); letter-spacing: 0.05em; }
        .yajak-date { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 10px; font-family: monospace; }
        .yajak-q { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 16px; line-height: 1.5; }
        .yajak-a { font-size: 15px; font-weight: 600; color: #c5cff5; line-height: 1.6; }
        .story-nav { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5; }
        .story-prev { left: 0; } .story-next { right: 0; }
    </style>
</head>

<script>
    // BGM — 킹스데일리 방식 (YT IFrame API)
    window.bgmPlayer = null;
    window.bgmReady = false;
    window.bgmMinimized = false;

    window.loadYTApi = function() {
        if (window.YT && window.YT.Player) { window.initBGMPlayer(); return; }
        if (document.getElementById('yt-api-script')) return;
        var s = document.createElement('script');
        s.id = 'yt-api-script';
        s.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(s);
    };
    window.onYouTubeIframeAPIReady = function() { window.initBGMPlayer(); };
    window.initBGMPlayer = function() {
        if (window.bgmPlayer) return;
        window.bgmPlayer = new YT.Player('bgm-player', {
            height: '160', width: '100%',
            videoId: 'fVAuVLKLUqQ',
            playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0, fs: 0 },
            events: { onReady: function(e) { window.bgmReady = true; e.target.playVideo(); } }
        });
    };
    function openBGM() {
        var popup = document.getElementById('bgm-popup');
        popup.style.display = 'block';
        document.getElementById('bgmBars').classList.remove('bgm-paused');
        document.getElementById('bgmText').innerText = 'Playing... ♪';
        setTimeout(function() { window.loadYTApi(); }, 50);
    }
    function minimizeBGM() {
        var body = document.getElementById('bgm-body');
        var popup = document.getElementById('bgm-popup');
        window.bgmMinimized = !window.bgmMinimized;
        body.style.display = window.bgmMinimized ? 'none' : 'block';
        popup.style.width = window.bgmMinimized ? '140px' : '280px';
    }
    function closeBGM() {
        document.getElementById('bgm-popup').style.display = 'none';
        document.getElementById('bgmBars').classList.add('bgm-paused');
        document.getElementById('bgmText').innerText = '턴테이블 플리';
        if (window.bgmPlayer && window.bgmReady) window.bgmPlayer.pauseVideo();
    }

    // BGM 팝업 드래그
    document.addEventListener('DOMContentLoaded', function() {
        var popup = document.getElementById('bgm-popup');
        var header = document.getElementById('bgm-header');
        if (!header) return;
        var dragging = false, ox = 0, oy = 0;
        header.addEventListener('mousedown', function(e) {
            dragging = true;
            ox = e.clientX - popup.getBoundingClientRect().left;
            oy = e.clientY - popup.getBoundingClientRect().top;
            popup.style.right = 'auto'; popup.style.bottom = 'auto';
            header.style.cursor = 'grabbing';
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            popup.style.left = (e.clientX - ox) + 'px';
            popup.style.top = (e.clientY - oy) + 'px';
        });
        document.addEventListener('mouseup', function() { dragging = false; header.style.cursor = 'grab'; });
        header.addEventListener('touchstart', function(e) {
            var t = e.touches[0]; dragging = true;
            ox = t.clientX - popup.getBoundingClientRect().left;
            oy = t.clientY - popup.getBoundingClientRect().top;
            popup.style.right = 'auto'; popup.style.bottom = 'auto';
        });
        document.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            var t = e.touches[0];
            popup.style.left = (t.clientX - ox) + 'px';
            popup.style.top = (t.clientY - oy) + 'px';
        });
        document.addEventListener('touchend', function() { dragging = false; });
    });

            caption: "<b>baek.dojin</b> 작업하다 찍혔습니다. 민혁이가 올리라고 해서 올립니다. 손에 석고가 많이 묻었습니다. <span style='color:#00376b'>#조소 #작업중 #석고</span>",

    const grid = document.getElementById('feedGrid');
    posts.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'grid-item';
        if (p.img) {
            div.innerHTML = `<img src="${p.img}">`;
        } else {
            div.textContent = p.emoji;
        }
        div.onclick = () => openModal(i);
        grid.appendChild(div);
    });

    let currentPostIndex = -1;

    function openModal(i) {
        currentPostIndex = i;
        const p = posts[i];
        const modal = document.getElementById('postModal');

        document.getElementById('actionHeart').classList.remove('liked-heart');
        document.getElementById('actionBookmark').classList.remove('saved-mark');

        const imgContainer = document.getElementById('modalImg');
        if (p.img) {
            imgContainer.innerHTML = `<img src="${p.img}"><svg class="pop-heart" id="popHeart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
        } else {
            imgContainer.innerHTML = `<span style="font-size:80px">${p.emoji}</span><svg class="pop-heart" id="popHeart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
        }

        document.getElementById('modalLocation').innerText = p.location || '';
        document.getElementById('modalLikes').innerText = p.likes + '명이 좋아합니다';
        document.getElementById('modalCaption').innerHTML = p.caption;
        document.getElementById('modalTime').innerText = p.time;

        renderComments();
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function openZoom() {
        const p = posts[currentPostIndex];
        if (!p.img) return;
        document.getElementById('zoomedImg').src = p.img;
        document.getElementById('zoomOverlay').style.display = 'flex';
    }
    function closeZoom() { document.getElementById('zoomOverlay').style.display = 'none'; }

    function renderComments() {
        const p = posts[currentPostIndex];
        const commsDiv = document.getElementById('modalComments');
        commsDiv.innerHTML = p.comments.map(c => `
            <div class="comment-row" style="${c.r ? 'margin-left: 36px; margin-top:-8px;' : ''}">
                <div class="c-avatar"><img src="https://ui-avatars.com/api/?name=${c.u}&background=random"></div>
                <div class="c-content"><b>${c.u}</b> ${c.t}</div>
            </div>
        `).join('');
    }

    function triggerHeart() {
        const heart = document.getElementById('popHeart');
        const actionHeart = document.getElementById('actionHeart');
        heart.classList.remove('animate-heart');
        void heart.offsetWidth;
        heart.classList.add('animate-heart');
        actionHeart.classList.add('liked-heart');
    }

    function toggleLike() { document.getElementById('actionHeart').classList.toggle('liked-heart'); }
    function toggleBookmark(el) { el.classList.toggle('saved-mark'); }

    function checkCommentInput() {
        const input = document.getElementById('commentInput').value;
        const btn = document.getElementById('commentSubmit');
        if (input.trim().length > 0) { btn.classList.add('active'); btn.disabled = false; }
        else { btn.classList.remove('active'); btn.disabled = true; }
    }

    function postComment() {
        const inputEl = document.getElementById('commentInput');
        const text = inputEl.value.trim();
        if (!text) return;
        posts[currentPostIndex].comments.push({ u: "visitor_U", t: text });
        renderComments();
        inputEl.value = '';
        checkCommentInput();
        const modalContent = document.querySelector('.modal-content');
        modalContent.scrollTop = modalContent.scrollHeight;
    }

    function closeModal() { document.getElementById('postModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

    // 야작 일지 스토리
    const stories = [
        { q: "MBTI 뭐예요?", a: "모릅니다.\n끌 경도나 물어보세요.\n(민혁이가 ISTJ라고 했습니다.)" },
        { q: "좋아하는 사람 생기면 어떻게 해요?", a: "...그런 거 생각할\n시간이 없습니다." },
        { q: "왜 야작해요?", a: "낮엔 사람이 많습니다.\n밤엔 조용합니다.\n이유는 이게 전부입니다." },
        { q: "친구 있어요?", a: "강민혁이 있습니다.\n시끄럽습니다.\n도움이 됩니다. 가끔." },
        { q: "이상형이 뭐예요?", a: "...생각해본 적 없습니다.\n석고 만져도 안 놀라는 사람이면\n괜찮을 것 같습니다." },
        { q: "밥은 먹고 다녀요?", a: "먹습니다.\n학식 아주머니가\n챙겨주십니다." }
    ];

    let sIdx = 0;

    function openStory() {
        document.getElementById('storyModal').style.display = 'flex';
        renderStory();
    }

    function changeStory(dir) {
        sIdx += dir;
        if (sIdx < 0) sIdx = 0;
        if (sIdx >= stories.length) { closeStory(); return; }
        renderStory();
    }

    function renderStory() {
        const s = stories[sIdx];
        document.getElementById('storyBody').innerHTML = `
            <div class="yajak-box">
                <div class="yajak-top">무엇이든 물어보세요</div>
                <div class="yajak-q">${s.q}</div>
                <div class="yajak-a">${s.a.replace(/\n/g, '<br>')}</div>
            </div>`;
        const progressDiv = document.getElementById('storyProgress');
        progressDiv.innerHTML = stories.map((_, i) => `<div class="s-bar ${i <= sIdx ? 'active' : ''}"></div>`).join('');
    }

    function closeStory() {
        document.getElementById('storyModal').style.display = 'none';
        sIdx = 0;
    }
</script>
